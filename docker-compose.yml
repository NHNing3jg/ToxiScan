version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: toxiscan-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000  # ← SEULE MODIFICATION ICI !
    container_name: toxiscan-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always